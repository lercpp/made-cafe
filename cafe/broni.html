<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yami Maid Café</title>

    <link rel="icon" href="foto/cat.jpg" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/broni.css">
</head>
<body>
    <div class="but">
        <button onclick="history.back()">Назад</button>
    </div>

<div class="booking-card">

    <h2>Бронирование столика</h2>

    <form>

        <div class="input-group">
            <label for="name">Ваше имя</label>
            <input type="text" id="name" placeholder="Введите имя">
        </div>

        <div class="input-group">
            <label for="phone">Телефон</label>
            <input type="tel" id="phone" placeholder="+7 (999) 999-99-99">
        </div>

        <div class="input-group">
            <label for="date">Дата</label>
            <input type="date" id="date">
        </div>

        <div class="input-group">
            <label for="time">Время</label>
            <input type="time" id="time">
        </div>

        <div class="input-group">
            <label for="people">Количество гостей</label>
            <input type="number" id="people" min="1" max="10" placeholder="Например: 4">
        </div>

        <button type="submit" class="book-btn">
            Забронировать столик
        </button>

    </form>

</div>

</body>
</html>
